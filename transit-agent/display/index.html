<!DOCTYPE html>
<html lang="en" style="background:#000">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <meta name="theme-color" content="#000000" />
  <title>Cabin Display</title>
  <style>
    @font-face {
      font-family: 'Circular XX';
      src: url('fonts/CircularXX-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Circular XX';
      src: url('fonts/CircularXX-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Circular XX';
      src: url('fonts/CircularXX-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    @property --pct {
      syntax: '<number>';
      inherits: true;
      initial-value: 0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px; min-height: 100vh; overflow: hidden;
      font-family: 'Circular XX', system-ui, -apple-system, sans-serif;
      background: #000; color: #fff;
      position: relative;
    }

    /* Content strip: 1920x360 anchored to bottom. Physical display shows only bottom 360px. */
    #display-strip {
      position: fixed; bottom: 0; left: 0;
      width: 1920px; height: 360px;
      display: flex;
      overflow: hidden;
      background: #0a0a0a;
    }

    /* ── CENTER: ride progress — always visible, fills all non-info space ── */
    #progress-panel {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    /* Next stop — the large prominent text (scaled for 1920px width) */
    .next-stop {
      font-size: 140px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ETA — below next-stop (scaled for 1920px width) */
    .eta-badge {
      font-size: 80px;
      opacity: 0.45;
      margin-top: 8px;
    }

    /* Progress bar pushed to bottom */
    .progress-section {
      margin-top: auto;
    }
    .progress-track {
      height: 40px;
      background: #4F4F4F;
      border-radius: 20px;
      position: relative;
    }
    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      width: calc(var(--pct, 0) * (100% - 40px) + 40px);
      max-width: 100%;
      height: 40px;
      background: rgba(255, 255, 255, 0.64);
      border-radius: 20px;
      z-index: 0;
    }
    .progress-knob {
      position: absolute;
      top: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      left: calc(var(--pct) * (100% - 40px));
      will-change: left;
      z-index: 1;
    }

    /* Info cards */
    .info-card {
      background: rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .info-card-label {
      font-size: 11px;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 5px;
    }
    .info-card-value {
      font-size: 20px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .info-card-detail {
      font-size: 13px;
      opacity: 0.5;
      margin-top: 3px;
    }

    /* ── Feedback context container: transcript left, presence circle right ── */
    #feedback-container {
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 16px;
      padding: 22px 22px 22px 0;
    }

    /* Presence circle — min 40px, right of transcript; opacity set by presence.js per state */
    #presence-circle {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #B851D2;
      border: none;
      cursor: pointer;
      outline: none;
      transform-origin: center center;
      will-change: transform;
      transition: none; /* no smoothing — scale must track level immediately */
    }

    /* Response content — visible when expanded; no transition on expand so text doesn't move; collapse animates when .feedback-collapsing */
    #feedback-content {
      flex: 0 0 0;
      min-width: 0;
      max-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      align-self: stretch;
      position: relative;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #feedback-container.expanded #feedback-content {
      flex: 0 0 4600px;
      width: 460px;
      max-width: 460px;
      opacity: 1;
      pointer-events: auto;
      padding-bottom: 24px;
    }
    #feedback-container.expanded #feedback-content.fade-out {
      opacity: 0;
    }
    /* Only when collapsing: animate content shrink + progress bar expansion so bar doesn't snap */
    body.feedback-collapsing #feedback-content {
      transition: opacity 0.4s ease, flex-basis 600ms ease-in-out, max-width 600ms ease-in-out;
    }
    body.feedback-collapsing .progress-fill {
      transition: width 600ms ease-in-out;
    }
    body.feedback-collapsing .progress-knob {
      transition: left 600ms ease-in-out;
    }
    /* Only when expanding: animate progress bar shrink + content slot growth; content hidden until done */
    body.feedback-expanding #feedback-content {
      transition: opacity 0.4s ease, flex-basis 600ms ease-in-out, max-width 600ms ease-in-out;
    }
    body.feedback-expanding .progress-fill {
      transition: width 600ms ease-in-out;
    }
    body.feedback-expanding .progress-knob {
      transition: left 600ms ease-in-out;
    }
    body.feedback-expanding #feedback-container.expanded #feedback-content.content-pending {
      opacity: 0;
    }

    /* Media area for image/video (optional) */
    #feedback-media {
      min-height: 0;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }
    #feedback-media img,
    #feedback-media video {
      display: block;
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
    }
    #feedback-media:empty { display: none; }

    /* ── Transcript reveal: contained within #feedback-content (position: relative) ── */
    #transcript-reveal-text {
      display: none;
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      padding: 0 24px;
      font-size: 48px;
      line-height: 1.6;
      color: #fff;
      text-align: left;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-sizing: border-box;
      will-change: transform;
      z-index: 0;
    }
    .ws-status {
      position: absolute;
      top: 8px;
      left: 16px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      z-index: 100;
    }
    .ws-status.error {
      color: #ff6b6b;
    }
    #text-reveal-gradient {
      display: none;
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        #0a0a0a 0%,
        #0a0a0a 6.25%,
        rgba(10, 10, 10, 0.48) 66.5%,
        rgba(10, 10, 10, 0) 97%,
        #0a0a0a 98%,
        #0a0a0a 100%
      );
    }
  </style>
</head>
<body style="background:#000;color:#fff;margin:0;min-height:100vh">

  <noscript>
    <div style="position:fixed;bottom:0;left:0;right:0;padding:24px;background:#111;color:#fff;font-size:24px;">
      Cabin Display — JavaScript required. Enable JS or check console for errors.
    </div>
  </noscript>

  <div id="display-strip">
  <!-- Connection status: visible when WS not connected -->
  <div id="ws-status" class="ws-status" aria-live="polite"></div>
  <!-- CENTER: ride progress — always visible -->
  <div id="progress-panel">
    <span id="next-stop"  class="next-stop">—</span>
    <span id="eta-badge"  class="eta-badge">—</span>
    <div class="progress-section">
      <div id="progress-track" class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
        <div id="progress-knob" class="progress-knob"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: feedback context — transcript/content left, presence circle right -->
  <div id="feedback-container">
    <div id="feedback-content">
      <div id="transcript-reveal-text" aria-hidden="true"></div>
      <div id="text-reveal-gradient"></div>
      <div id="feedback-media"></div>
      <div id="info-card-primary" class="info-card" style="display:none">
        <div id="info-label"  class="info-card-label">Status</div>
        <div id="info-value"  class="info-card-value">—</div>
        <div id="info-detail" class="info-card-detail"></div>
      </div>
      <div id="info-card-secondary" class="info-card" style="display:none">
        <div class="info-card-label">Walk</div>
        <div id="info-walk" class="info-card-value">—</div>
      </div>
    </div>
    <button id="presence-circle" title="Presence"></button>
  </div>
  </div>

  <script src="layers/presence.js"></script>
  <script src="ws_client.js"></script>
  <script src="main.js"></script>
</body>
</html>
